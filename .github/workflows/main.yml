name: Génération automatique des JSON (Atlas Senorif)

# 1. Ce workflow se déclenche uniquement si on modifie le fichier Excel
on:
  push:
    paths:
      - 'ATLAS_COMPLET.xlsx'  # ⚠️ ATTENTION : Modifie ce nom si ton fichier Excel s'appelle autrement (ex: TEST.xlsx)
  # Permet aussi de lancer le script manuellement depuis l'onglet Actions
  workflow_dispatch: 

# 2. Permissions nécessaires pour que le bot puisse modifier ton dépôt
permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      # Étape A : On "télécharge" le code de ton dépôt sur le serveur GitHub
      - name: Checkout du code
        uses: actions/checkout@v4

      # Étape B : On prépare un environnement Python
      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Étape C : On installe les librairies dont ton script a besoin
      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl numpy

      # Étape D : On lance TON script Python (celui que tu viens de m'envoyer)
      - name: Exécution du script Python
        run: python convert_excel_to_json.py  # ⚠️ Vérifie que le nom du script correspond bien !

      # Étape E : On sauvegarde (commit) et on envoie (push) les nouveaux fichiers JSON générés
      - name: Commit et Push des modifications
        run: |
          # On configure l'identité du "Bot" GitHub
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # On ajoute les fichiers générés
          git add arbre_dynamique.json base_etudes.json
          
          # On vérifie s'il y a eu des changements. Si oui, on commit et on push.
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Mise à jour automatique de la base de données JSON depuis Excel" && git push)
