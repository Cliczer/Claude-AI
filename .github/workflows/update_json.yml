name: Génération automatique des JSON (Atlas Senorif)

on:
  push:
    branches:
      - 'claude/excel-to-json-conversion-diQCb' # Déclenche si on push sur cette branche
    paths:
      - 'ATLAS_COMPLET.xlsx'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          ref: 'claude/excel-to-json-conversion-diQCb' # On force le bot à travailler sur cette branche

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl numpy

      - name: Exécution du script Python
        run: python convert_excel_to_json.py

      - name: Commit et Push des modifications
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add arbre_dynamique.json base_etudes.json
          
          # On force le push vers ta branche spécifique
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Mise à jour automatique de la base de données JSON" && git push origin claude/excel-to-json-conversion-diQCb)
